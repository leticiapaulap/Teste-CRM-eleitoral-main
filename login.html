<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIV - Login</title>
  <meta name="description" content="Login da equipe e coordenadores do SIV." />
  <link rel="icon" href="img/LOGO-SIV.png" />
  <link rel="stylesheet" href="styles.css?v=20260701-7" />
  <script type="module" src="login.js" defer></script>
</head>

<body>
  <main class="wrap loginWrap">
    <section class="brand" aria-label="Acesso SIV">
      <div class="topline"></div>

      <div class="badge">
        <span class="dot"></span>
        <span>SIV - Area restrita</span>
      </div>

      <h1 class="title">Login</h1>

      <p class="subtitle">
        Acesso para equipe e coordenadores acompanharem cadastros e redes autorizadas.
      </p>

      <a class="loginButton loginBackButton" href="/">Voltar ao cadastro</a>
    </section>

    <section class="card" aria-label="Formulario de login">
      <h2 class="formtitle">Entrar na area restrita</h2>
      <p class="formhint">Use seu email e senha cadastrados.</p>

      <form id="formLogin">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="seu@email.com" autocomplete="email" required />

        <label for="password">Senha</label>
        <input id="password" name="password" type="password" placeholder="Sua senha" autocomplete="current-password" required />

        <button id="btnLogin" type="submit">Entrar</button>

        <div id="loginMsg" class="msg"></div>
      </form>
    </section>
  </main>
</body>

</html>
