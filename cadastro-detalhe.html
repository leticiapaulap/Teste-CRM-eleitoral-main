<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SIV - Cadastro completo</title>
  <meta name="description" content="Detalhes completos do cadastro no SIV." />
  <link rel="icon" href="img/LOGO-SIV.png" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="cadastro-detalhe.js" defer></script>
</head>

<body class="dashboardBody">
  <main class="dashboardShell">
    <header class="dashboardHeader">
      <div>
        <div class="badge">
          <span class="dot"></span>
          <span>SIV - Cadastro completo</span>
        </div>
        <h1 id="detailTitle" class="dashboardTitle">Cadastro</h1>
        <p id="detailSubtitle" class="dashboardSubtitle">Carregando informacoes...</p>
      </div>

      <div class="dashboardActions">
        <a class="btnSecondary dashboardLink" href="/dashboard.html">Voltar ao painel</a>
        <button id="btnLogout" class="btnSecondary dashboardLogout" type="button">Sair</button>
      </div>
    </header>

    <section class="dashboardPanel detailHero" aria-label="Resumo do cadastro">
      <div class="detailPhotoWrap">
        <img id="detailPhoto" class="detailPhoto" src="img/LOGO-SIV.png" alt="Foto do cadastro" />
      </div>
      <div class="detailSummary">
        <span id="detailRole" class="rolePill">-</span>
        <h2 id="detailName">-</h2>
        <p id="detailContact">-</p>
        <p id="detailLocation">-</p>
      </div>
      <div class="detailActions">
        <button type="button" id="btnCopyDetailLink" class="btnSecondary">Copiar link</button>
        <button type="button" id="btnEmailDetail" class="btnSecondary">Enviar email</button>
        <button type="button" id="btnDeleteDetail" class="btnDanger detailDanger">Excluir</button>
      </div>
    </section>

    <section class="detailLayout">
      <article class="dashboardPanel">
        <div class="panelHeader">
          <div>
            <h2>Dados completos</h2>
            <p>Informacoes pessoais, rede e link de cadastro.</p>
          </div>
        </div>
        <div id="detailGrid" class="profileGrid"></div>
        <div class="invite adminInvite">
          <div class="inviteTitle">Link de cadastro</div>
          <div class="inviteRow">
            <input id="detailReferralLink" readonly />
            <button type="button" id="btnCopyDetailLinkInline" class="btnSecondary">Copiar</button>
          </div>
        </div>
      </article>

      <article class="dashboardPanel">
        <div class="panelHeader">
          <div>
            <h2>Editar cadastro</h2>
            <p>Altere os campos e salve.</p>
          </div>
        </div>

        <form id="detailEditForm" class="editForm detailEditForm">
          <div class="editGrid">
            <div>
              <label for="editName">Nome</label>
              <input id="editName" name="name" required />
            </div>
            <div>
              <label for="editEmail">Email</label>
              <input id="editEmail" name="email" type="email" required />
            </div>
            <div>
              <label for="editPhone">Telefone</label>
              <input id="editPhone" name="phone" required />
            </div>
            <div>
              <label for="editRole">Tipo</label>
              <select id="editRole" name="role" required>
                <option value="EQUIPE">Equipe</option>
                <option value="COORDENADORES">Coordenador</option>
                <option value="LIDERES">Lider</option>
                <option value="CADASTRADOS">Cadastrado</option>
              </select>
            </div>
            <div>
              <label for="editLocalidade">Localidade</label>
              <input id="editLocalidade" name="localidade" required />
            </div>
            <div>
              <label for="editRegiao">Regiao administrativa</label>
              <input id="editRegiao" name="regiao_administrativa" />
            </div>
            <div>
              <label for="editLatitude">Latitude</label>
              <input id="editLatitude" name="latitude" inputmode="decimal" />
            </div>
            <div>
              <label for="editLongitude">Longitude</label>
              <input id="editLongitude" name="longitude" inputmode="decimal" />
            </div>
            <div>
              <label for="editPhoto">Nova foto</label>
              <input id="editPhoto" name="photo" type="file" accept="image/*" capture="user" />
            </div>
            <div>
              <label for="editPassword">Nova senha</label>
              <input id="editPassword" name="password" type="password" placeholder="Deixe vazio para manter" />
            </div>
            <label class="check editActive">
              <input id="editActive" name="active" type="checkbox" />
              <span>Cadastro ativo</span>
            </label>
          </div>

          <div id="detailMsg" class="msg"></div>
          <div class="modalActions">
            <button type="submit" id="btnSaveDetail">Salvar alteracoes</button>
          </div>
        </form>
      </article>
    </section>
  </main>
</body>

</html>
